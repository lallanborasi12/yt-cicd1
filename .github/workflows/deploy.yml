name: React CI/CD Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Archive Build
        run: tar -czf build.tar.gz build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build.tar.gz

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build

      - name: Configure SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Upload Build to EC2
        run: |
          scp -o StrictHostKeyChecking=no \
            -i private_key.pem \
            build.tar.gz \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/tmp/build.tar.gz

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i private_key.pem \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
          sudo mkdir -p /var/www/react-app
          cd /tmp
          rm -rf react-build
          mkdir react-build
          tar -xzf build.tar.gz -C react-build
          sudo rm -rf /var/www/react-app/*
          sudo cp -r react-build/build/* /var/www/react-app/
          sudo chown -R www-data:www-data /var/www/react-app
          sudo nginx -t
          sudo systemctl restart nginx
          rm -rf react-build
          rm -f build.tar.gz
          EOF

      - name: Cleanup
        run: rm -f private_key.pem

      - name: Verify Deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }})
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "Deployment Successful"
            exit 0
          fi
          echo "Deployment Failed"
          exit 1